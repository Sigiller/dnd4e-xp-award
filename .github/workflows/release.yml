name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify tag matches module.json version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_VER="${TAG#v}"
          MVER=$(jq -r .version module.json)
          if [ "$TAG_VER" != "$MVER" ]; then
            echo "::error::Tag $TAG implies version $TAG_VER but module.json has $MVER"
            exit 1
          fi

      - name: Build module
        run: npm ci && npm run build

      - name: Stage module folder and inject manifest URLs
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          MODULE_ID=$(jq -r .id module.json)
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          LATEST_MANIFEST="https://github.com/${REPO}/releases/latest/download/module.json"
          mkdir -p "staging/${MODULE_ID}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='staging' \
            --exclude='node_modules' \
            --exclude='src' \
            --exclude='tests' \
            --exclude='docs' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='vite.config.ts' \
            --exclude='tsconfig.json' \
            ./ "staging/${MODULE_ID}/"
          jq --arg manifest "${LATEST_MANIFEST}" --arg download "${BASE}/module.zip" \
            '. + {manifest: $manifest, download: $download}' module.json \
            > "staging/${MODULE_ID}/module.json"
          mkdir -p dist
          cp "staging/${MODULE_ID}/module.json" dist/module.json
          (cd staging && zip -rq ../dist/module.zip "$MODULE_ID")

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/module.zip
            dist/module.json
          generate_release_notes: true
